<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="../assets/images/logo.svg">
  <title>Login — Hearthside</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            ink: 'var(--color-ink)',
            forest: 'var(--color-forest)',
            'forest-light': 'var(--color-forest-light)',
            brass: 'var(--color-brass)',
            'brass-light': 'var(--color-brass-light)',
            parchment: 'var(--color-parchment)',
            stone: 'var(--color-stone)',
            ash: 'var(--color-ash)',
            coal: 'var(--color-coal)',
            'bg-page': 'var(--bg-page)',
            'bg-panel': 'var(--bg-panel)',
            'text-headline': 'var(--text-headline)',
            'text-body': 'var(--text-body)',
            'text-muted': 'var(--text-muted)',
          },
          fontFamily: {
            display: ['"Playfair Display"', 'Georgia', 'serif'],
            body: ['"Source Serif 4"', 'Georgia', 'serif'],
          },
          borderRadius: {
            sm: '4px', md: '8px', lg: '16px', xl: '24px', '2xl': '32px',
          },
          boxShadow: {
            lift: '0 12px 40px rgba(28,43,38,0.12)',
          },
        }
      }
    }
  </script>
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="../assets/css/dark-mode.css">
  <link rel="stylesheet" href="../assets/css/rtl.css">
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://code.iconify.design/3/3.1.0/iconify.min.js"></script>
</head>
<body class="bg-bg-page text-text-body font-body transition-colors duration-300 min-h-screen relative overflow-x-hidden flex flex-col">
  
  <!-- ── Global Auth Header ── -->
  <header class="h-20 flex items-center bg-transparent relative z-50">
    <div class="max-w-7xl mx-auto px-6 w-full flex justify-between items-center gap-4">
      <div class="flex-shrink-0">
        <a href="../index.html" class="flex items-center gap-1 sm:gap-2 group">
          <img src="../assets/images/logo.svg" alt="Hearthside Logo" class="w-7 h-7 sm:w-10 sm:h-10 transition-transform duration-500 group-hover:scale-110">
          <span class="font-display text-base sm:text-2xl font-bold text-text-headline tracking-tighter uppercase leading-none">Hearthside</span>
        </a>
      </div>

      <div class="flex items-center gap-2">
        <button data-rtl-toggle class="flex items-center gap-2 px-3 py-1.5 text-text-headline hover:text-brass transition-colors rounded-full font-bold">
          <span class="text-[11px] font-bold tracking-widest leading-none" data-rtl-label>RTL</span>
          <i data-lucide="move-horizontal" class="w-4 h-4"></i>
        </button>
        <button data-dark-toggle class="p-2 text-text-headline hover:text-brass transition-colors rounded-full">
          <i data-lucide="moon" class="w-5 h-5"></i>
        </button>
      </div>
    </div>
  </header>

  <main class="flex-grow flex items-center justify-center p-6">
    <div class="max-w-md w-full">
      <!-- Auth Card -->
      <div class="bg-bg-panel rounded-[2rem] shadow-lift p-6 sm:p-8 border border-ink/5 dark:border-parchment/10">
        <div class="space-y-6">
          <!-- Main Form -->
          <form class="space-y-4" onsubmit="event.preventDefault(); window.location.href='../pages/user-dashboard.html'">
            <div class="space-y-5">
              <div class="space-y-1 relative group/field">
                <label class="block text-[10px] uppercase font-bold text-brass tracking-widest mb-1">Email Address</label>
                <input type="email" required placeholder="name@domain.com" 
                  class="w-full bg-transparent border-b border-ink/20 dark:border-parchment/20 px-0 py-2.5 focus:border-brass outline-none text-base text-text-headline transition-all placeholder-ink/20 font-medium">
              </div>

              <div class="space-y-1 relative group/field">
                <label class="block text-[10px] uppercase font-bold text-brass tracking-widest mb-1">Secure Password</label>
                <div class="relative">
                  <input type="password" id="password" required placeholder="••••••••" 
                    class="w-full bg-transparent border-b border-ink/20 dark:border-parchment/20 px-0 py-2.5 pe-20 focus:border-brass outline-none text-base text-text-headline transition-all placeholder-ink/20 font-medium">
                  <button type="button" data-password-toggle aria-controls="password" class="absolute inset-inline-end-6 top-1/2 -translate-y-1/2 p-2 text-text-muted hover:text-brass transition-colors outline-none">
                    <i data-lucide="eye" class="w-4 h-4"></i>
                  </button>
                </div>
              </div>

              <div class="flex items-center justify-between pt-1">
                <label class="flex items-center gap-2 cursor-pointer group">
                  <input type="checkbox" class="w-3.5 h-3.5 rounded border-ink/20 dark:border-parchment/20 accent-brass bg-transparent">
                  <span class="text-[9px] font-bold text-text-muted uppercase tracking-[0.2em] group-hover:text-brass transition-colors">Remember Me</span>
                </label>
                <a href="#" class="text-[9px] font-bold text-text-muted hover:text-brass transition-colors uppercase tracking-[0.2em]">Forgot Password?</a>
              </div>
            </div>

            <button type="submit" class="w-full bg-brass hover:bg-brass-light text-white py-3.5 rounded-full font-bold text-xs uppercase tracking-[0.3em] shadow-md transition-all active:scale-[0.98] mt-4">
              Sign In
            </button>
          </form>

          <!-- Social Auth (Moved to Bottom) -->
          <div class="space-y-5 pt-1">
            <div class="flex items-center gap-4">
              <div class="h-[1px] flex-grow bg-ink/5 dark:bg-parchment/10"></div>
              <span class="text-[9px] uppercase font-bold text-text-muted tracking-widest whitespace-nowrap">Or login via</span>
              <div class="h-[1px] flex-grow bg-ink/5 dark:bg-parchment/10"></div>
            </div>

            <div class="grid grid-cols-2 gap-4">
              <button class="flex items-center justify-center gap-3 bg-stone/10 dark:bg-coal/20 py-3 rounded-full border border-ink/5 dark:border-parchment/5 hover:bg-stone/20 dark:hover:bg-coal/40 transition-all group text-[10px] font-bold uppercase tracking-widest text-text-headline">
                <span class="iconify w-5 h-5 text-[#4285F4]" data-icon="logos:google-icon"></span>
                Google
              </button>
              <button class="flex items-center justify-center gap-3 bg-stone/10 dark:bg-coal/20 py-3 rounded-full border border-ink/5 dark:border-parchment/5 hover:bg-stone/20 dark:hover:bg-coal/40 transition-all group text-[10px] font-bold uppercase tracking-widest text-text-headline">
                <span class="iconify w-5 h-5 text-[#1877F2]" data-icon="logos:facebook"></span>
                Facebook
              </button>
            </div>
          </div>

          <div class="text-center pt-1">
            <p class="text-[10px] font-bold text-text-muted uppercase tracking-widest">
              Don't have an account? <a href="register.html" class="text-brass hover:underline underline-offset-4 decoration-2">Register</a>
            </p>
          </div>
        </div>
      </div>
    </div>
  </main>

  <footer class="py-4 text-center opacity-30 italic">
    <p class="text-[9px] uppercase font-bold tracking-widest leading-none">&copy; 2024 Hearthside</p>
  </footer>

  <script src="../assets/js/main.js"></script>
</body>
</html>
