<!DOCTYPE html>
<html lang="en" dir="ltr" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guest Portal — Hearthside</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            'forest': '#2C4A3E',
            'brass': '#B8956A',
            'ink': '#1C2B26',
            'coal': '#121514',
            'parchment': '#F9F7F2',
            'stone': '#E8E4D9',
          },
          fontFamily: {
            display: ['"Playfair Display"', 'serif'],
            body: ['"Source Serif 4"', 'serif'],
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="../assets/css/dark-mode.css">
  <link rel="stylesheet" href="../assets/css/rtl.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Source+Serif+4:wght@400;600&display=swap" rel="stylesheet">
</head>
<body class="bg-bg-page text-text-headline font-body transition-colors duration-300 min-h-screen flex items-center justify-center p-6">
  <div class="max-w-2xl text-center reveal">
    <div class="flex flex-col items-center gap-0 mb-16 group">
      <img src="../assets/images/logo.svg" alt="Hearthside Logo" class="w-16 h-16 transition-all duration-700 group-hover:scale-110">
      <span class="font-display text-3xl font-bold text-ink dark:text-parchment tracking-tighter uppercase leading-none">Hearthside</span>
    </div>

    <span class="text-brass uppercase tracking-[0.4em] text-[10px] font-bold mb-6 block">The Guest Collective</span>
    <h1 class="font-display text-5xl md:text-6xl font-bold mb-8 leading-tight text-text-headline">Your Retreat <br><i class="font-normal italic">Awaits.</i></h1>
    <p class="text-text-body text-xl italic font-medium opacity-80 mb-12 max-w-md mx-auto">The guest experience is currently being refined to ensure every moment of your stay is captured in luxury.</p>

    <div class="flex flex-col sm:flex-row gap-4 justify-center">
      <a href="../index.html" class="px-12 py-5 bg-forest hover:bg-forest-light text-white rounded-2xl font-bold uppercase tracking-widest text-[10px] transition-all">Back to Story</a>
      <a href="../pages/rooms.html" class="px-12 py-5 border-2 border-ink/10 dark:border-parchment/10 text-text-headline rounded-2xl font-bold uppercase tracking-widest text-[10px] hover:bg-stone/20 transition-all">Book Another Stay</a>
    </div>
  </div>
</body>
</html>
