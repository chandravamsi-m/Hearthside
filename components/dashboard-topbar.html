<!-- Dashboard Topbar Component -->
<header data-topbar class="fixed top-0 left-0 lg:left-72 right-0 h-24 bg-surface/80 dark:bg-surface-dark/80 backdrop-blur-md z-40 border-b border-gray-100 dark:border-gray-800 px-8 transition-all duration-300">
    <div class="h-full flex items-center justify-between">
        <!-- Breadcrumbs or Title -->
        <div>
            <h2 id="page-title" class="font-display text-2xl font-bold text-text-main">Overview</h2>
            <div id="breadcrumb" class="flex items-center gap-2 text-[10px] uppercase font-bold text-gray-400 tracking-widest mt-1">
                <a href="home.html" class="hover:text-accent">Dashboard</a>
                <span>/</span>
                <span id="breadcrumb-current">Overview</span>
            </div>
        </div>

        <!-- Actions -->
        <div class="flex items-center gap-6">
            <!-- Search -->
            <div class="hidden md:flex items-center gap-3 px-4 py-2 bg-white dark:bg-gray-900 border border-gray-100 dark:border-gray-800 rounded-full text-gray-400 focus-within:border-accent group">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                <input type="text" placeholder="Search experiences..." class="bg-transparent border-none text-xs font-bold focus:ring-0 p-0 w-48">
            </div>

            <!-- Notifications -->
            <button class="relative w-10 h-10 flex items-center justify-center text-gray-400 hover:text-accent transition-colors">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/></svg>
                <span class="absolute top-2 right-2 w-2 h-2 bg-accent rounded-full border-2 border-surface"></span>
            </button>

            <!-- Language/Theme Toggles -->
            <button data-dark-mode-toggle class="w-10 h-10 flex items-center justify-center text-gray-400 hover:text-accent transition-colors">
                <svg class="w-6 h-6 dark:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
                <svg class="w-6 h-6 hidden dark:block" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707M16.071 16.071l.707.707M7.757 7.757l.707.707M12 8a4 4 0 100 8 4 4 0 000-8z"/></svg>
            </button>

            <!-- Mobile Menu Toggle -->
            <button data-sidebar-toggle class="lg:hidden w-10 h-10 flex items-center justify-center text-text-main">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"/></svg>
            </button>
        </div>
    </div>
</header>
